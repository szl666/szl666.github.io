name: Get Citation Data

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd ./google_scholar_crawler
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run crawler
      run: |
        cd ./google_scholar_crawler
        python3 main.py
      env:
        GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # Copy to root for jsDelivr CDN compatibility
        cp google_scholar_crawler/results/gs_data.json gs_data.json
        cp google_scholar_crawler/results/gs_data_shieldsio.json gs_data_shieldsio.json
        git add -f google_scholar_crawler/results/*.json gs_data.json gs_data_shieldsio.json
        if git diff --staged --quiet; then
          echo "No changes, skipping commit"
        else
          git commit -m "Updated Citation Data - $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin main
          git push origin HEAD:google-scholar-stats --force
        fi
